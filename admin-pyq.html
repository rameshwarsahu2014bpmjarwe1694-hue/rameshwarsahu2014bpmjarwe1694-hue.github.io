<!-- =========================  
FILE : admin-pyq.html  
STRICT FINAL RULES COMPATIBLE VERSION  
AUTO LOGIN + PDF + QUESTION + BULK + DELETE  
========================= -->  <!DOCTYPE html>  <html lang="en">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width,initial-scale=1.0">  
<title>Admin PYQ Panel</title>  <style>  
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}  
body{background:#f4f6f9;padding:20px}  
.container{  
max-width:1000px;  
margin:auto;  
background:#fff;  
padding:20px;  
border-radius:12px;  
box-shadow:0 5px 15px rgba(0,0,0,.08)  
}  
h1{text-align:center;margin-bottom:20px}  
h3{margin:15px 0 10px}  
.grid{display:grid;gap:12px}  
input,select,textarea{  
width:100%;  
padding:12px;  
border:1px solid #ccc;  
border-radius:8px;  
font-size:16px;  
outline:none  
}  
textarea{min-height:110px}  
button{  
padding:12px;  
border:none;  
border-radius:8px;  
font-size:16px;  
font-weight:bold;  
cursor:pointer  
}  
.save-btn{background:#007bff;color:#fff}  
.delete-btn{background:#dc3545;color:#fff}  
.card{  
background:#fafafa;  
padding:15px;  
border:1px solid #ddd;  
border-radius:10px;  
margin-bottom:12px  
}  
.row{  
display:flex;  
justify-content:space-between;  
gap:10px;  
flex-wrap:wrap  
}  
.small{font-size:14px;color:#666;margin-top:5px}  
.status{text-align:center;font-weight:bold;margin:12px 0}  
hr{margin:20px 0;border:none;border-top:1px solid #ddd}  
</style>  </head>  
<body>  <div class="container">  <h1>Admin PYQ Panel</h1>  <div class="grid">  <select id="category">  
<option value="">Select Category</option>  
<option>PYQ 2020</option>  
<option>PYQ 2021</option>  
<option>PYQ 2022</option>  
<option>PYQ 2023</option>  
<option>PYQ 2024</option>  
<option>PYQ 2025</option>  
<option>PYQ 2026</option>  
<option>Model Paper</option>  
<option>Practice Set</option>  
</select>  <select id="post">  
<option value="">Select Post</option>  
<option>MTS</option>  
<option>POSTMAN</option>  
<option>PA-SA</option>  
</select>  </div>  <div id="statusMsg" class="status">Loading...</div>  <hr>  <h3>PDF OCR to Bulk Text</h3>  <div class="grid">  
<input type="file" id="pdfFile" accept=".pdf,image/*">  
<button class="save-btn" onclick="extractPdf()">Extract Questions</button>  
</div>  
<h3>Save PDF</h3>  <div class="grid">  
<input type="text" id="title" placeholder="PDF Title">  
<input type="text" id="fileName" placeholder="PDF File Name or URL">  
<textarea id="desc" placeholder="Description"></textarea>  
<button class="save-btn" onclick="savePdf()">Save PDF</button>  
</div>  <hr>  <h3>Add Question</h3>  <div class="grid">  
<textarea id="question" placeholder="Question"></textarea>  
<input type="text" id="a" placeholder="Option A">  
<input type="text" id="b" placeholder="Option B">  
<input type="text" id="c" placeholder="Option C">  
<input type="text" id="d" placeholder="Option D">  <select id="ans">  
<option value="">Select Answer</option>  
<option>A</option>  
<option>B</option>  
<option>C</option>  
<option>D</option>  
</select>  <button class="save-btn" onclick="saveQuestion()">Save Question</button>

</div>  <hr>  <h3>Bulk Import</h3>  <div class="grid">  
<textarea id="bulk" placeholder="Question  
A) Option A  
B) Option B  
C) Option C  
D) Option D  
Answer: A"></textarea>  <button class="save-btn" onclick="bulkSave()">Bulk Save</button>

</div>  <hr>  <h3>Saved PDFs</h3>  
<div id="pdfList">Loading...</div>  <hr>  <h3>Saved Questions</h3>  
<div id="questionList">Loading...
</div>  </div> 

  
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyDjzmo0A4KhOkrqFQdOyCEek6bsPF-UVPQ",
    authDomain: "gds-departmental-exam-studyhub.firebaseapp.com",
    projectId: "gds-departmental-exam-studyhub",
    storageBucket: "gds-departmental-exam-studyhub.appspot.com",
    messagingSenderId: "759916756080",
    appId: "1:759916756080:web:7f2c0e66458bd007e888b5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const statusMsg = document.getElementById("statusMsg");

const ADMIN_EMAIL = "rameshwarsahu2014bpmjarwe1694@gmail.com";

function status(t, color = "green") {
    statusMsg.innerText = t;
    statusMsg.style.color = color;
}

// --- LOGIN PROCESS ---
async function loginAndStart() {
    const userPass = prompt("Admin Password Darj Karein:");
    if(!userPass) return status("Password required to connect!", "red");

    try {
        status("Connecting to Firebase...", "blue");
        await signInWithEmailAndPassword(auth, ADMIN_EMAIL, userPass);
        status("Admin Logged In & Connected ✅");
        loadAll(); 
    } catch (err) {
        status("Login Failed: " + err.message, "red");
    }
}

// --- FIX 1: SAVE PDF ---
window.savePdf = async function() {
    const t = document.getElementById('title').value;
    const f = document.getElementById('fileName').value;
    const d = document.getElementById('desc').value;
    if(!t || !f) return alert("Title aur File Name bharein!");
    try {
        await addDoc(collection(db, "pdfs"), { title: t, fileName: f, description: d, createdAt: serverTimestamp() });
        status("PDF Saved! ✅");
        loadAll();
    } catch(e) { status("Error: " + e.message, "red"); }
};

// --- FIX 2: SAVE SINGLE QUESTION ---
window.saveQuestion = async function() {
    const q = document.getElementById('question').value;
    const ans = document.getElementById('ans').value;
    const cat = document.getElementById('category').value;
    const post = document.getElementById('post').value;

    if(!q || !ans || !cat || !post) return alert("Fill all fields!");

    try {
        await addDoc(collection(db, "pyqQuestions"), {
            question: q,
            options: [
                document.getElementById('a').value,
                document.getElementById('b').value,
                document.getElementById('c').value,
                document.getElementById('d').value
            ], // Yahan nested array nahi banega ab
            answer: ans,
            category: cat,
            post: post,
            createdAt: serverTimestamp()
        });
        status("Question Saved! ✅");
        loadAll();
    } catch(e) { status("Error: " + e.message, "red"); }
};

// --- FIX 3: BULK SAVE ---
window.bulkSave = async function() {
    const raw = document.getElementById('bulk').value.trim();
    const cat = document.getElementById('category').value;
    const post = document.getElementById('post').value;

    if (!raw || !cat || !post) return alert("Details bharein!");

    const lines = raw.split('\n');
    try {
        for (let line of lines) {
            const p = line.split('|').map(x => x.trim());
            if (p.length >= 6) {
                await addDoc(collection(db, "pyqQuestions"), {
                    question: p,
                    options: [p, p, p, p], // Individual elements daale hain, array nahi
                    answer: p,
                    category: cat,
                    post: post,
                    createdAt: serverTimestamp()
                });
            }
        }
        status("Bulk Upload Success! ✅");
        document.getElementById('bulk').value = "";
        loadAll();
    } catch (e) { status("Error: " + e.message, "red"); }
};


// --- FIX 4: OCR EXTRACT ---
window.extractPdf = function() {
    const file = document.getElementById('pdfFile').files;
    if(!file) return alert("File choose karein!");
    status("Processing OCR...", "orange");
    Tesseract.recognize(file, 'eng+hin').then(({ data: { text } }) => {
        document.getElementById('bulk').value = text;
        status("OCR Done! ✅");
    });
};

// --- FIX 5: LOAD ALL DATA (IMPORTANT: Iske bina login error dega) ---
async function loadAll() {
    try {
        const qSnap = await getDocs(query(collection(db, "pyqQuestions"), orderBy("createdAt", "desc")));
        let qHtml = "";
        qSnap.forEach(docSnap => {
            const d = docSnap.data();
            qHtml += `<div class="card"><b>${d.question}</b><br><small>${d.category} | ${d.post}</small>
                <button class="delete-btn" style="float:right" onclick="deleteQ('${docSnap.id}')">Delete</button></div>`;
        });
        document.getElementById("questionList").innerHTML = qHtml || "No Questions Found";

        const pSnap = await getDocs(query(collection(db, "pdfs"), orderBy("createdAt", "desc")));
        let pHtml = "";
        pSnap.forEach(s => {
            pHtml += `<div class="card"><b>${s.data().title}</b><button class="delete-btn" style="float:right" onclick="deleteItem('pdfs','${s.id}')">Delete</button></div>`;
        });
        document.getElementById("pdfList").innerHTML = pHtml || "No PDFs Found";
    } catch (e) { console.error(e); }
}

window.deleteQ = async (id) => { 
    if(confirm("Delete Question?")) { await deleteDoc(doc(db, "pyqQuestions", id)); loadAll(); } 
};

window.deleteItem = async (col, id) => { 
    if(confirm("Delete PDF?")) { await deleteDoc(doc(db, col, id)); loadAll(); } 
};


// Start application
loginAndStart();

</script>

      
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>  
</body>  
</html>
