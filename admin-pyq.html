<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin PYQ Panel - Complete</title>
<style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
    body{background:#f4f6f9;padding:20px}
    .container{max-width:1000px;margin:auto;background:#fff;padding:20px;border-radius:12px;box-shadow:0 5px 15px rgba(0,0,0,.08)}
    h1{text-align:center;margin-bottom:20px;color:#333}
    h3{margin:20px 0 10px; color:#007bff; border-left: 4px solid #007bff; padding-left: 10px;}
    .grid{display:grid;gap:12px; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));}
    input,select,textarea{width:100%;padding:12px;border:1px solid #ccc;border-radius:8px;font-size:16px;outline:none}
    textarea{min-height:110px}
    
    .btn-row { display: flex; gap: 10px; margin-top: 10px; }
    button{padding:12px;border:none;border-radius:8px;font-size:16px;font-weight:bold;cursor:pointer; transition: 0.2s;}
    
    .save-btn{background:#007bff;color:#fff; width: 100%; margin-top: 10px;}
    .bulk-btn{background:#28a745;color:#fff;}
    .delete-btn{background:#dc3545;color:#fff}
    
    .card{background:#fafafa;padding:15px;border:1px solid #ddd;border-radius:10px;margin-bottom:12px}
    .status{text-align:center;font-weight:bold;margin:12px 0; padding:10px; border-radius:8px; display:none;}
    hr{margin:25px 0;border:none;border-top:1px solid #ddd}
    .q-box { background: #fdfdfd; border: 1px solid #e0e0e0; padding: 15px; border-radius: 8px; margin-top: 10px;}
</style>
</head>
<body>

<div class="container">
    <h1>Admin PYQ Panel</h1>

    <div class="grid">
        <select id="category">
            <option value="">Select Category</option>
            <option>PYQ 2020</option>
            <option>PYQ 2021</option>
            <option>PYQ 2022</option>
            <option>PYQ 2023</option>
            <option>PYQ 2024</option>
            <option>PYQ 2025</option>
            <option>PYQ 2026</option>
            <option>Model Paper</option>
            <option>Practice Set</option>
        </select>
        <select id="post">
            <option value="">Select Post</option>
            <option>MTS</option>
            <option>POSTMAN</option>
            <option>PA-SA</option>
        </select>
    </div>

    <div id="statusMsg" class="status">Loading...</div>

    <hr>

    <h3>PDF Management</h3>
    <div class="grid">
        <div>
            <label class="small">Extract from File:</label>
            <input type="file" id="pdfFile" accept=".pdf,image/*">
            <button class="save-btn" style="background:#6f42c1" onclick="extractPdf()">Extract Text (OCR)</button>
        </div>
        <div>
            <label class="small">Save PDF Link:</label>
            <input type="text" id="pdfTitle" placeholder="Title">
            <input type="text" id="pdfUrl" placeholder="File URL">
            <button class="save-btn" onclick="savePdf()">Save PDF Info</button>
        </div>
    </div>

    <hr>

    <h3>Add Single Question</h3>
    <div class="q-box">
        <textarea id="q_text" placeholder="Enter Question"></textarea>
        <div class="grid" style="margin-top:10px">
            <input type="text" id="q_a" placeholder="Option A">
            <input type="text" id="q_b" placeholder="Option B">
            <input type="text" id="q_c" placeholder="Option C">
            <input type="text" id="q_d" placeholder="Option D">
        </div>
        <div class="grid" style="margin-top:10px">
            <select id="q_ans">
                <option value="">Correct Answer</option>
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="C">C</option>
                <option value="D">D</option>
            </select>
            <button class="save-btn" onclick="saveSingleQuestion()">Upload Question</button>
        </div>
    </div>

    <hr>

    <h3>Bulk Upload Questions</h3>
    <p style="font-size:12px; color:gray">Format: Question | A | B | C | D | Ans (One per line)</p>
    <textarea id="bulkText" placeholder="Example: What is Post? | Job | Fun | Work | None | A"></textarea>
    <div class="btn-row">
        <button class="bulk-btn" style="flex:2" onclick="saveBulk()">Process & Save All</button>
        <button class="delete-btn" style="flex:1" onclick="document.getElementById('bulkText').value=''">Clear</button>
    </div>

</div>

<script>
    function showMsg(text, color="#28a745") {
        const s = document.getElementById('statusMsg');
        s.innerText = text;
        s.style.display = 'block';
        s.style.background = color;
        s.style.color = "#fff";
        setTimeout(()=> s.style.display='none', 3000);
    }

    // --- Original Functions ---
    function extractPdf() {
        showMsg("Extracting Text... (Feature link needed)", "#6f42c1");
    }

    function savePdf() {
        const title = document.getElementById('pdfTitle').value;
        if(!title) return alert("Title fill karein");
        showMsg("PDF Saved!");
    }

    // --- New Single Question Function ---
    function saveSingleQuestion() {
        const q = document.getElementById('q_text').value;
        const ans = document.getElementById('q_ans').value;
        
        if(!q || !ans) return alert("Sawaal aur sahi jawab zaruri hai!");
        
        const data = {
            question: q,
            options: [
                document.getElementById('q_a').value,
                document.getElementById('q_b').value,
                document.getElementById('q_c').value,
                document.getElementById('q_d').value
            ],
            answer: ans,
            cat: document.getElementById('category').value,
            post: document.getElementById('post').value
        };
        
        console.log("Single Q Data:", data);
        showMsg("Question Uploaded!");
    }

    // --- New Bulk Function ---
    function saveBulk() {
        const raw = document.getElementById('bulkText').value.trim();
        if(!raw) return alert("Bulk text box khali hai!");
        
        const lines = raw.split('\n');
        let count = 0;
        
        lines.forEach(line => {
            const parts = line.split('|').map(p => p.trim());
            if(parts.length >= 6) {
                // Yahan aapka API call jayega
                count++;
            }
        });
        
        showMsg(`${count} Questions added successfully!`);
    }
</script>

</body>
</html>
