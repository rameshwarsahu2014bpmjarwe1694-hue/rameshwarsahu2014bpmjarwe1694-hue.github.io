<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Syllabus Dashboard</title>
    <style>
        /* Exact UI matching your candidate dashboard screenshot */
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI', Tahoma, sans-serif;}
        body{background:#f9f9f9;padding:15px;display:flex;justify-content:center;}
        .container{width:100%;max-width:450px;}
        .card{background:#fff;padding:20px;border-radius:15px;margin-bottom:15px;border:1px solid #eee;box-shadow:0 2px 5px rgba(0,0,0,0.05);}
        .badge{background:#e7f1ff;color:#007bff;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:bold;display:inline-block;}
        .card h3{margin:10px 0 5px;font-size:22px;color:#111;}
        .btn-pdf{display:block;width:100%;padding:14px;background:#28a745;color:#fff;text-align:center;text-decoration:none;border-radius:10px;font-weight:bold;border:none;cursor:pointer;font-size:16px;}
        .loading{text-align:center;padding:50px;color:#666;}
    </style>
</head>
<body>

<div class="container" id="syllabus-list">
    <div class="loading">Fetching Syllabus...</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// Firebase Configuration
const firebaseConfig = {
    apiKey: "AIzaSyDjzmo0A4KhOkrqFQdOyCEek6bsPF-UVPQ",
    authDomain: "gds-departmental-exam-studyhub.firebaseapp.com",
    projectId: "gds-departmental-exam-studyhub",
    storageBucket: "gds-departmental-exam-studyhub.appspot.com",
    messagingSenderId: "759916756080",
    appId: "1:759916756080:web:7f2c0e66458bd007e888b5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const BACKEND_URL = "https://payment-backend-2-g6go.onrender.com";
let userEmail = "";

// Auth state observer to get the logged-in user's email
onAuthStateChanged(auth, (user) => {
    if (user) { 
        userEmail = user.email; 
        loadSyllabus(); 
    } else { 
        window.location.href = "login.html"; 
    }
});

// Function to decode HTML entities (fixes the &amp; issue from Admin esc() function)
function decodeHTMLEntities(text) {
    const textArea = document.createElement('textarea');
    textArea.innerHTML = text;
    return textArea.value.trim();
}

async function loadSyllabus() {
    const listDiv = document.getElementById("syllabus-list");
    try {
        const q = query(collection(db, "syllabus"), orderBy("createdAt", "desc"));
        const snap = await getDocs(q);
        listDiv.innerHTML = "";
        
        if (snap.empty) {
            listDiv.innerHTML = "<p style='text-align:center;'>No syllabus found.</p>";
            return;
        }

        snap.forEach(doc => {
            const d = doc.data();
            
            // Setting Parameters based on your requirement
            const postType = (d.category || "").trim(); // MTS, Postman, PA/SA
            const exactFileName = decodeHTMLEntities(d.fileName || ""); // Exact file name from DB

            // Constructing URL with all 3 parameters: email, post, and filename
            const url = `${BACKEND_URL}/get-pdf?email=${encodeURIComponent(userEmail)}&post=${encodeURIComponent(postType)}&filename=${encodeURIComponent(exactFileName)}`;

            listDiv.innerHTML += `
                <div class="card">
                    <span class="badge">${postType}</span>
                    <h3>${d.title}</h3>
                    <p style="color:#666; font-size:13px; margin-bottom:15px;">${d.desc || 'Latest Pattern'}</p>
                    <button class="btn-pdf" onclick="window.open('${url}', '_blank')">
                        📖 Open Syllabus PDF
                    </button>
                </div>`;
        });
    } catch(err) { 
        listDiv.innerHTML = "<p style='text-align:center; color:red;'>Error loading data.</p>"; 
    }
}
</script>
</body>
</html>
